name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend with Maven
        run: mvn clean package -DskipTests
        working-directory: ./backend

      - name: Build Client Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

      - name: Build Admin Frontend
        run: |
          npm install
          npm run build
        working-directory: ./admin-frontend

      - name: Build Docker images
        run: IMAGE_TAG=${GITHUB_SHA::8} docker compose -f deploy/docker-compose.yml build
        env:
          DOCKER_BUILDKIT: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker images to GHCR
        run: |
          IMAGE_TAG=${GITHUB_SHA::8} docker compose -f deploy/docker-compose.yml push
          # 也推送 latest 标签
          for service in gateway auth-service user-service product-service order-service; do
            docker tag ghcr.io/frigidom1024/warmart-${service}:${GITHUB_SHA::8} ghcr.io/frigidom1024/warmart-${service}:latest
            docker push ghcr.io/frigidom1024/warmart-${service}:latest
          done
