server:
  port: 8081
spring:
  application:
    name: auth-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        enabled: false
  datasource:
    url: jdbc:mysql://localhost:3309/mall_auth?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
springdoc:
  api-docs:
    path: /auth-service/v3/api-docs
  swagger-ui:
    path: /auth-service/swagger-ui.html

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mall.auth.entity
  configuration:
    map-underscore-to-camel-case: true

# ============================================
# 阿里云 DirectMail 配置
# ============================================
email:
  sender-type: ${EMAIL_SENDER_TYPE:-aliyun}  # 可选值: aliyun(生产) / mock(本地开发)，可通过环境变量 EMAIL_SENDER_TYPE 覆盖

aliyun:
  dm:
    access-key-id: ${ALIYUN_DM_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_DM_ACCESS_KEY_SECRET}
    account-name: ${ALIYUN_DM_ACCOUNT_NAME}
    address-type: 1
    reply-to-address: true

# ============================================
# 验证码配置
# ============================================
auth:
  code:
    length: 6
    expiration: 300
    resend-interval: 60
    daily-limit: 10
