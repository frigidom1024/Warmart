server:
  port: 8080
spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/product/**
        - id: product-static
          uri: lb://product-service
          predicates:
            - Path=/images/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/**
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/**
        - id: product-service-docs
          uri: lb://product-service
          predicates:
            - Path=/product-service/**
        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/order-service/**

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    urls:
      - name: auth-service
        url: /auth-service/v3/api-docs
      - name: user-service
        url: /user-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
