services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: mall-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "${NACOS_PORT:-8848}:8848"
    networks:
      - mall-network

  mysql:
    image: mysql:8.0
    container_name: mall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - mall-network

  redis:
    image: redis:7-alpine
    container_name: mall-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - mall-network

  gateway:
    build:
      context: ../backend
      dockerfile: gateway/Dockerfile
    container_name: mall-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mall_auth?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - mall-network

  auth-service:
    build:
      context: ../backend
      dockerfile: auth-service/Dockerfile
    container_name: mall-auth-service
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mall_auth?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - mall-network

  user-service:
    build:
      context: ../backend
      dockerfile: user-service/Dockerfile
    container_name: mall-user-service
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT:-8082}:8082"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mall_user?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI: http://auth-service:8081
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - mall-network

  product-service:
    build:
      context: ../backend
      dockerfile: product-service/Dockerfile
    container_name: mall-product-service
    restart: unless-stopped
    ports:
      - "${PRODUCT_SERVICE_PORT:-8083}:8083"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mall_product?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI: http://auth-service:8081
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # 文件上传大小限制（可覆盖）
      MULTIPART_MAX_FILE_SIZE: ${MULTIPART_MAX_FILE_SIZE:-10MB}
      MULTIPART_MAX_REQUEST_SIZE: ${MULTIPART_MAX_REQUEST_SIZE:-10MB}
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - mall-network

  order-service:
    build:
      context: ../backend
      dockerfile: order-service/Dockerfile
    container_name: mall-order-service
    restart: unless-stopped
    ports:
      - "${ORDER_SERVICE_PORT:-8084}:8084"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mall_order?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI: http://auth-service:8081
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - mall-network

volumes:
  mysql-data:

networks:
  mall-network:
    driver: bridge
